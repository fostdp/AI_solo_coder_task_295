version: '3.8'

services:
  gravity-visualizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gravity-visualizer
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped
    volumes:
      - ./public:/app/public:ro
    networks:
      - gravity-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  gravity-network:
    driver: bridge
