<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重力场势能可视化</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #skeleton {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #skeleton.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .skeleton-logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .skeleton-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .skeleton-loader {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .skeleton-planet {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
        }

        .skeleton-planet:nth-child(1) {
            background: linear-gradient(135deg, #FF6B6B, #ee5a5a);
            animation: orbit 2s ease-in-out infinite;
            animation-delay: 0s;
        }

        .skeleton-planet:nth-child(2) {
            background: linear-gradient(135deg, #4ECDC4, #3dbdb5);
            animation: orbit 2s ease-in-out infinite;
            animation-delay: 0.3s;
        }

        .skeleton-planet:nth-child(3) {
            background: linear-gradient(135deg, #FFE66D, #f0d645);
            animation: orbit 2s ease-in-out infinite;
            animation-delay: 0.6s;
        }

        .skeleton-planet::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);
            transform-origin: left center;
            animation: gravity-line 1.5s ease-in-out infinite;
        }

        .skeleton-progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .skeleton-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            animation: progress 2s ease-in-out forwards;
        }

        .skeleton-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes orbit {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes gravity-line {
            0%, 100% { transform: rotate(0deg) scaleX(1); opacity: 0.5; }
            50% { transform: rotate(180deg) scaleX(0.5); opacity: 0.2; }
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="skeleton">
        <div class="skeleton-logo">🌌</div>
        <div class="skeleton-title">重力场势能可视化</div>
        <div class="skeleton-loader">
            <div class="skeleton-planet"></div>
            <div class="skeleton-planet"></div>
            <div class="skeleton-planet"></div>
        </div>
        <div class="skeleton-progress">
            <div class="skeleton-progress-bar"></div>
        </div>
        <div class="skeleton-text">正在初始化引力场引擎...</div>
    </div>

    <div class="container">
        <h1>🌌 重力场势能可视化</h1>
        <div class="controls">
            <button id="saveBtn">💾 保存配置</button>
            <button id="resetBtn">🔄 重置</button>
            <label class="toggle-label">
                <input type="checkbox" id="showParticles" checked>
                显示测试粒子
            </label>
        </div>
        <div class="canvas-container">
            <canvas id="gravityCanvas"></canvas>
        </div>
        <div class="info-panel">
            <div class="info-item">
                <span class="label">提示:</span>
                <span class="value">拖拽天体改变位置</span>
            </div>
            <div class="info-item">
                <span class="label">等势线:</span>
                <span class="value">颜色越深势能越低</span>
            </div>
            <div class="info-item">
                <span class="label">粒子:</span>
                <span class="value">箭头表示受力方向</span>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var skeleton = document.getElementById('skeleton');
                if (skeleton) {
                    skeleton.classList.add('hidden');
                    setTimeout(function() {
                        skeleton.remove();
                    }, 500);
                }
            }, 2200);
        });
    </script>
    <script src="app-worker.js"></script>
</body>
</html>
